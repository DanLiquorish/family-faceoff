<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Faceoff — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0e17; --surface:#1a1927; --surface2:#232235;
    --accent:#ff6b35; --accent2:#f7c59f; --purple:#a78bfa;
    --green:#34d399; --red:#f87171; --text:#fffffe; --muted:#a7a9be;
    --border:rgba(255,255,255,0.08);
    --font-display:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(circle at 30% 10%,rgba(167,139,250,0.1) 0%,transparent 50%),radial-gradient(circle at 70% 90%,rgba(255,107,53,0.1) 0%,transparent 50%); pointer-events:none; z-index:0; }

  .screen { display:none; min-height:100vh; position:relative; z-index:1; }
  .screen.active { display:flex; flex-direction:column; }

  /* JOIN */
  #screen-join { align-items:center; justify-content:center; padding:2rem 1.5rem; text-align:center; }
  .logo { font-family:var(--font-display); font-size:3rem; letter-spacing:2px; }
  .logo span { color:var(--accent); }
  .join-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2rem 1.5rem; width:100%; max-width:360px; margin-top:1.5rem; }
  .field-label { font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; display:block; }
  input[type=text], input[type=number] { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px 16px; color:var(--text); font-size:1rem; font-family:var(--font-body); margin-bottom:1.25rem; outline:none; transition:border-color 0.2s; }
  input[type=text]:focus, input[type=number]:focus { border-color:var(--purple); }
  input::placeholder { color:var(--muted); }
  .btn { width:100%; padding:16px; border-radius:50px; border:none; font-family:var(--font-body); font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:active { background:#cc5a2a; transform:scale(0.98); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

  /* WAITING */
  #screen-waiting { align-items:center; justify-content:center; padding:2rem 1.5rem; text-align:center; }
  .waiting-avatar { width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:600; margin:0 auto 1rem; }
  .waiting-name { font-family:var(--font-display); font-size:2.5rem; }
  .waiting-msg { color:var(--muted); margin:0.5rem 0 2rem; }
  .spinner { width:40px; height:40px; border:3px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .pulse { animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ROUND INTRO */
  #screen-round-intro { align-items:center; justify-content:center; padding:2rem 1.5rem; text-align:center; }
  .round-intro-icon { font-size:4rem; margin-bottom:0.5rem; }
  .round-intro-num { font-family:var(--font-display); font-size:4rem; color:var(--accent); line-height:1; }
  .round-intro-title { font-family:var(--font-display); font-size:2rem; margin-bottom:0.5rem; }
  .round-intro-desc { color:var(--muted); font-size:0.95rem; }

  /* QUESTION */
  #screen-question { padding:1.25rem; justify-content:flex-start; }
  .q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; }
  .q-round { font-family:var(--font-display); color:var(--muted); font-size:1rem; }
  .q-num { background:var(--surface); border:1px solid var(--border); border-radius:50px; padding:4px 12px; font-size:0.8rem; color:var(--accent2); }
  .q-timer { font-family:var(--font-display); font-size:2rem; color:var(--accent); min-width:36px; text-align:right; }
  .q-type { font-size:0.8rem; color:var(--muted); margin-bottom:0.75rem; }
  .score-badge { display:inline-flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:50px; padding:6px 14px; font-size:0.85rem; margin-bottom:1rem; }
  .score-num { font-family:var(--font-display); font-size:1.2rem; color:var(--accent); }

  /* Landmark image on player */
  .landmark-img-player { width:100%; max-height:200px; object-fit:cover; border-radius:14px; margin-bottom:1rem; }
  .landmark-img-wrap-player { background:var(--surface2); border-radius:14px; min-height:120px; display:flex; align-items:center; justify-content:center; margin-bottom:1rem; overflow:hidden; }

  .q-text { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.25rem; margin-bottom:1rem; font-size:1rem; font-weight:500; line-height:1.5; }
  .option-btn { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; color:var(--text); font-size:1rem; font-family:var(--font-body); font-weight:500; cursor:pointer; text-align:left; margin-bottom:10px; display:flex; align-items:center; gap:12px; transition:all 0.15s; }
  .option-btn:active:not(:disabled) { transform:scale(0.98); }
  .option-btn:disabled { cursor:not-allowed; }
  .option-btn.selected { background:rgba(167,139,250,0.2); border-color:var(--purple); }
  .option-btn.correct { background:rgba(52,211,153,0.2); border-color:var(--green); }
  .option-btn.wrong { background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.3); opacity:0.6; }
  .opt-letter { font-family:var(--font-display); font-size:1.4rem; color:var(--muted); min-width:22px; }

  /* Closest number */
  .guess-wrap { margin-top:0.5rem; }
  .guess-input-row { display:flex; gap:10px; margin-bottom:1rem; }
  .guess-input-row input { flex:1; margin-bottom:0; font-size:1.3rem; text-align:center; font-family:var(--font-display); letter-spacing:2px; }

  .result-card { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:1rem 1.25rem; margin-top:1rem; }
  .result-label { font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.25rem; }

  /* ANSWERED */
  #screen-answered { align-items:center; justify-content:center; padding:2rem; text-align:center; }
  .answered-icon { font-size:3rem; margin-bottom:1rem; }
  .answered-msg { font-family:var(--font-display); font-size:2rem; margin-bottom:0.5rem; }

  /* GAMEOVER */
  #screen-gameover { align-items:center; justify-content:center; padding:2rem 1.5rem; text-align:center; }
  .go-score { font-family:var(--font-display); font-size:5rem; color:var(--accent); line-height:1; }
  .go-rank { font-family:var(--font-display); font-size:1.5rem; color:var(--purple); margin:0.5rem 0 2rem; }

  .reveal { animation:reveal 0.35s ease; }
  @keyframes reveal { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join" class="screen active">
  <div class="logo">FAMILY<span>FACEOFF</span></div>
  <p style="color:var(--muted);font-size:0.9rem;margin-top:0.25rem;">Join the game on your device</p>
  <div class="join-card">
    <label class="field-label">Your name</label>
    <input type="text" id="input-name" placeholder="Enter your name..." maxlength="20" />
    <label class="field-label">Room code</label>
    <input type="text" id="input-code" placeholder="e.g. AB3X7" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-family:var(--font-display);font-size:1.5rem;" />
    <button class="btn btn-primary" onclick="joinGame()">Join game</button>
    <p id="join-error" style="color:var(--red);font-size:0.85rem;margin-top:0.75rem;display:none;"></p>
  </div>
</div>

<!-- WAITING -->
<div id="screen-waiting" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;text-align:center;">
    <div class="waiting-avatar" id="waiting-avatar"></div>
    <div class="waiting-name" id="waiting-name"></div>
    <p class="waiting-msg">You're in! Waiting for the host to start...</p>
    <div class="spinner pulse"></div>
  </div>
</div>

<!-- ROUND INTRO -->
<div id="screen-round-intro" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;text-align:center;">
    <div class="round-intro-icon" id="p-intro-icon">🧠</div>
    <div class="round-intro-num" id="p-intro-round">ROUND 1</div>
    <div class="round-intro-title" id="p-intro-title">GENERAL KNOWLEDGE</div>
    <p class="round-intro-desc" id="p-intro-desc">Get ready...</p>
    <div style="margin-top:2rem;" class="pulse">
      <div class="spinner"></div>
      <p style="color:var(--muted);margin-top:0.75rem;font-size:0.85rem;">Preparing questions...</p>
    </div>
  </div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <div class="q-round" id="q-round">ROUND 1</div>
    <div class="q-num" id="q-num">Q 1/5</div>
    <div class="q-timer" id="q-timer">20</div>
  </div>
  <div class="score-badge">Score: <span class="score-num" id="my-score">0</span></div>
  <div id="q-answer-area"></div>
  <div id="q-result" style="display:none;" class="reveal">
    <div class="result-card" id="q-result-card">
      <div class="result-label">Result</div>
      <div id="q-result-text"></div>
    </div>
  </div>
</div>

<!-- ANSWERED WAITING -->
<div id="screen-answered" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;text-align:center;">
    <div class="answered-icon" id="answered-icon">✓</div>
    <div class="answered-msg" id="answered-msg">Submitted!</div>
    <p style="color:var(--muted);margin-bottom:2rem;" id="answered-sub">Next question coming up...</p>
    <div class="spinner"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;text-align:center;">
    <div style="font-family:var(--font-display);font-size:2.5rem;margin-bottom:0.5rem;">FINAL SCORE</div>
    <div class="go-score" id="go-score">0</div>
    <div style="color:var(--muted);margin-bottom:0.5rem;">points</div>
    <div class="go-rank" id="go-rank"></div>
    <p style="color:var(--muted);margin-bottom:2rem;">Thanks for playing!</p>
    <button class="btn btn-primary" onclick="resetToJoin()" style="max-width:300px;">Play again</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZSgZ_Csfb6ui_8R1XdzOX1Tj7Iz1o6-I",
  authDomain: "family-faceoff-8ad0b.firebaseapp.com",
  databaseURL: "https://family-faceoff-8ad0b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "family-faceoff-8ad0b",
  storageBucket: "family-faceoff-8ad0b.firebasestorage.app",
  messagingSenderId: "123359290040",
  appId: "1:123359290040:web:3d1d30af10f29328e6ca4d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLORS = [
  {bg:'#a78bfa',text:'#1a0040'},{bg:'#ff6b35',text:'#2a1000'},
  {bg:'#2dd4bf',text:'#002a26'},{bg:'#fbbf24',text:'#2a1a00'},
  {bg:'#34d399',text:'#00270f'},{bg:'#f472b6',text:'#2a0020'},
];

let state = {
  name:'', roomCode:'', myColor:COLORS[0], myScore:0,
  currentRound:0, currentQuestion:0, hasAnswered:false,
  timerInterval:null, timeLeft:0, seenQuestion:null
};

async function joinGame() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  const errEl = document.getElementById('join-error');
  errEl.style.display='none';
  if (!name) { errEl.textContent='Please enter your name.'; errEl.style.display='block'; return; }
  if (!code||code.length<4) { errEl.textContent='Please enter a valid room code.'; errEl.style.display='block'; return; }
  try {
    const snap = await get(ref(db,`rooms/${code}`));
    if (!snap.exists()) { errEl.textContent='Room not found. Check the code!'; errEl.style.display='block'; return; }
  } catch(e) { errEl.textContent='Could not connect. Check your Firebase config.'; errEl.style.display='block'; return; }

  state.name=name; state.roomCode=code; state.myScore=0;
  await update(ref(db,`rooms/${code}/players/${name}`),{name,joined:Date.now()});
  const snap = await get(ref(db,`rooms/${code}/players`));
  const players = snap.val()||{};
  const idx = Object.keys(players).indexOf(name);
  state.myColor = COLORS[idx%COLORS.length];

  const av = document.getElementById('waiting-avatar');
  av.style.background = state.myColor.bg;
  av.style.color = state.myColor.text;
  av.textContent = name[0].toUpperCase();
  document.getElementById('waiting-name').textContent = name;
  showScreen('screen-waiting');
  listenToRoom();
}
window.joinGame = joinGame;

function listenToRoom() {
  onValue(ref(db,`rooms/${state.roomCode}`), snap => {
    const room = snap.val();
    if (!room) return;
    const status = room.status;

    // Update score whenever available
    if (room.scores?.[state.name] !== undefined) {
      state.myScore = room.scores[state.name];
      const el = document.getElementById('my-score');
      if (el) el.textContent = state.myScore;
    }

    if (status === 'round-intro') {
      document.getElementById('p-intro-icon').textContent = room.roundIcon||'🎮';
      document.getElementById('p-intro-round').textContent = `ROUND ${room.roundNum}`;
      document.getElementById('p-intro-title').textContent = (room.roundLabel||'').toUpperCase();
      document.getElementById('p-intro-desc').textContent = 'Get ready...';
      showScreen('screen-round-intro');
    } else if (status === 'question') {
      const qKey = `${room.roundNum}-${room.questionNum}`;
      if (qKey !== state.seenQuestion) {
        state.seenQuestion = qKey;
        state.currentRound = room.roundNum;
        state.currentQuestion = room.questionNum;
        state.hasAnswered = false;
        const q = JSON.parse(room.currentQuestion||'{}');
        renderQuestion(q, room.roundId, room.roundNum, room.questionNum);
        showScreen('screen-question');
      }
    } else if (status === 'revealed') {
      if (!state.hasAnswered) {
        showScreen('screen-answered');
        document.getElementById('answered-icon').textContent = '⏱';
        document.getElementById('answered-msg').textContent = "Time's up!";
        document.getElementById('answered-sub').textContent = 'Next question coming...';
      }
    } else if (status === 'gameover') {
      const scores = room.scores||{};
      const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
      const rank = sorted.findIndex(([n])=>n===state.name)+1;
      state.myScore = scores[state.name]||0;
      document.getElementById('go-score').textContent = state.myScore;
      document.getElementById('go-rank').textContent = rank===1?'🏆 Winner!':rank===2?'🥈 2nd place':rank===3?'🥉 3rd place':`#${rank} place`;
      clearTimer();
      showScreen('screen-gameover');
    } else if (status === 'lobby') {
      state.currentRound=0; state.myScore=0; state.seenQuestion=null;
      if (state.name) showScreen('screen-waiting');
    }
  });
}

async function fetchWikipediaImage(searchTerm) {
  try {
    const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchTerm)}`);
    const data = await resp.json();
    return data.thumbnail?.source || data.originalimage?.source || null;
  } catch(e) { return null; }
}

function renderQuestion(q, roundId, roundNum, qNum) {
  clearTimer();
  document.getElementById('q-round').textContent = `ROUND ${roundNum}`;
  document.getElementById('q-num').textContent = `Q ${qNum}`;
  document.getElementById('my-score').textContent = state.myScore;
  document.getElementById('q-result').style.display='none';

  const area = document.getElementById('q-answer-area');
  area.innerHTML='';

  const isMulti = ['general','sport','music','history','landmark'].includes(roundId);

  if (roundId === 'landmark') {
    // Show image + options
    const wrap = document.createElement('div');
    wrap.className='landmark-img-wrap-player';
    wrap.innerHTML='<p style="color:var(--muted);font-size:0.85rem;padding:1rem;">Loading image...</p>';
    area.appendChild(wrap);
    fetchWikipediaImage(q.wikiSearch).then(imgUrl => {
      wrap.innerHTML = imgUrl
        ? `<img src="${imgUrl}" class="landmark-img-player" alt="Where is this?" />`
        : `<p style="color:var(--muted);padding:1.5rem;font-size:0.9rem;">📍 Somewhere in the world...</p>`;
    });
    const desc = document.createElement('div');
    desc.className='q-text reveal';
    desc.textContent = q.description;
    area.appendChild(desc);
    renderMultiChoice(q, area, roundId);
    startTimer(30);
  } else if (isMulti) {
    const qText = document.createElement('div');
    qText.className='q-text reveal';
    qText.textContent = q.question;
    area.appendChild(qText);
    renderMultiChoice(q, area, roundId);
    startTimer(20);
  } else if (roundId === 'closest') {
    const qText = document.createElement('div');
    qText.className='q-text reveal';
    qText.textContent = q.question;
    area.appendChild(qText);
    const wrap = document.createElement('div');
    wrap.className='guess-wrap';
    wrap.innerHTML=`<div class="guess-input-row">
      <input type="number" id="guess-input" placeholder="Your guess..." />
      <button class="btn btn-primary" onclick="submitGuess()" style="width:auto;padding:14px 20px;border-radius:12px;flex-shrink:0;">Submit</button>
    </div>`;
    area.appendChild(wrap);
    startTimer(35);
  }
}

function renderMultiChoice(q, area, roundId) {
  q.options.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className='option-btn reveal';
    btn.style.animationDelay=(i*0.06)+'s';
    btn.innerHTML=`<span class="opt-letter">${'ABCD'[i]}</span> ${opt.replace(/^[A-D]\.\s*/,'')}`;
    btn.onclick=()=>submitAnswer(i, q, btn, roundId);
    area.appendChild(btn);
  });
}

function submitAnswer(idx, q, btn, roundId) {
  if (state.hasAnswered) return;
  state.hasAnswered=true;
  clearTimer();
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  btn.classList.add('selected');
  const answerIdx = q.options.findIndex(o=>o===q.answer);
  const correct = idx===answerIdx;
  if (correct) { btn.classList.add('correct'); showResultMsg('Correct! 🎉', true); }
  else { btn.classList.add('wrong'); const cb=document.querySelectorAll('.option-btn')[answerIdx]; if(cb)cb.classList.add('correct'); showResultMsg('Not quite!', false); }
  update(ref(db,`rooms/${state.roomCode}/answers/${state.name}`),{optionIndex:idx,timeLeft:state.timeLeft});
}

window.submitGuess = function() {
  if (state.hasAnswered) return;
  const val = document.getElementById('guess-input')?.value;
  if (!val) return;
  state.hasAnswered=true;
  clearTimer();
  showResultMsg(`Your guess: ${val} — waiting for reveal!`, null);
  update(ref(db,`rooms/${state.roomCode}/guesses/${state.name}`),parseInt(val));
};

function showResultMsg(msg, correct) {
  const el=document.getElementById('q-result');
  document.getElementById('q-result-text').textContent=msg;
  el.style.display='block';
  document.getElementById('q-result-card').style.borderColor = correct===true?'var(--green)':correct===false?'var(--red)':'var(--border)';
}

function startTimer(secs) {
  state.timeLeft=secs;
  const el=document.getElementById('q-timer');
  if(el) el.textContent=secs;
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timeLeft--;
    const e=document.getElementById('q-timer');
    if(e){ e.textContent=state.timeLeft; e.style.color=state.timeLeft<=5?'var(--red)':'var(--accent)'; }
    if(state.timeLeft<=0){ clearTimer(); if(!state.hasAnswered){ state.hasAnswered=true; showResultMsg("Time's up!",false); }}
  },1000);
}
function clearTimer(){ clearInterval(state.timerInterval); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

window.resetToJoin = () => {
  state.name=''; state.roomCode=''; state.myScore=0; state.seenQuestion=null;
  showScreen('screen-join');
};
</script>
</body>
</html>
